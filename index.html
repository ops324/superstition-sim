<body>
  <h1>迷信の誕生シミュレーション</h1>
  <p class="sub">スキナーのハト「迷信行動」実験（1948）のAI版 — 報酬は行動と無関係なのに、なぜ迷信が生まれるのか</p>

  <div class="panel">
    <span class="badge">PR③ 統計エンジン</span>
    <p style="margin:10px 0 0">
      乱数生成・エージェント・シミュレーションエンジンに加え、統計エンジン（不完全ガンマ関数・
      カイ二乗検定・p値較正・一様性検定）を実装しました。描画UIは後続PRで追加します。
      現時点の動作はブラウザのコンソール（スモークテスト出力）で確認できます。
      詳細は <code>README.md</code> を参照してください。
    </p>
  </div>

  <!-- 後続PRで各パネルを実装する。ここは配置のプレースホルダ。 -->
  <div class="panel" id="population-panel">
    <h2 style="margin-top:0">母集団パネル（A10体・B10体）</h2>
    <p class="todo">PR④以降で実装予定。</p>
  </div>
  <div class="panel" id="stats-panel">
    <h2 style="margin-top:0">統計パネル</h2>
    <p class="todo">PR④以降で実装予定。</p>
  </div>

<script>
"use strict";
(function () {
  // ===================================================================
  // 迷信の誕生シミュレーション — 単一ファイル実装
  //   ・外部依存なし / ビルド不要 / file:// 直開き対応（module不使用）
  //   ・全ロジックはこの1つのIIFE内に閉じ込める
  // ===================================================================

  // ===== SECTION: PRNG（乱数生成・シード導出） ========================
  // Math.random() はシード指定できないため、再現性のある PRNG を用いる。

  /**
   * mulberry32: 32bitシードから [0,1) の乱数列を返すシード可能PRNG。
   * @param {number} seed 符号なし32bit整数として解釈される。
   * @returns {() => number} next()
   */
  function mulberry32(seed) {
    let a = seed >>> 0;
    return function next() {
      a |= 0;
      a = (a + 0x6d2b79f5) | 0;
      let t = Math.imul(a ^ (a >>> 15), 1 | a);
      t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
      return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
    };
  }

  /**
   * xmur3: 文字列から32bit整数を生成するハッシュ関数（シード導出用）。
   * mulberry32 は隣接シードが相関しやすいため、シードは必ずこのハッシュを
   * 通して decorrelate する（base+index の単純な算術導出は使わない）。
   * @param {string} str
   * @returns {() => number} 呼ぶたびに次の32bitハッシュを返す
   */
  function xmur3(str) {
    let h = 1779033703 ^ str.length;
    for (let i = 0; i < str.length; i++) {
      h = Math.imul(h ^ str.charCodeAt(i), 3432918353);
      h = (h << 13) | (h >>> 19);
    }
    return function () {
      h = Math.imul(h ^ (h >>> 16), 2246822507);
      h = Math.imul(h ^ (h >>> 13), 3266489909);
      h ^= h >>> 16;
      return h >>> 0;
    };
  }

  /**
   * deriveSeed: ベースシード・ラベル・インデックスから独立なシードを導出。
   * 例: 報酬ストリームは personaIndex のみ、行動ストリームは (personaIndex, kind)
   *     でキーし、xmur3 でハッシュして無相関にする。
   * @param {number|string} base
   * @param {string} label 例 "reward" / "action"
   * @param {number|string} index
   * @returns {number} 32bit seed
   */
  function deriveSeed(base, label, index) {
    return xmur3(base + ":" + label + ":" + index)();
  }

  // ===== SECTION: Environment（報酬環境・構造監査の対象） =============
  //
  // ★恣意性排除の第一の担保（構造監査）★
  //   createRewardStream の引数は (p, seed) のみ。行動・エージェントを表す
  //   変数はこの関数のスコープに一切存在しない。ゆえに報酬は「行動を読む」
  //   ことが構造的に不可能である。
  //
  /**
   * createRewardStream: 各ステップ独立に Bernoulli(p) の報酬を返すストリーム。
   * 行動とは完全に無関係（引数・クロージャに行動変数が存在しない）。
   * @param {number} p 報酬確率 [0,1]
   * @param {number} seed
   * @returns {{ next: () => 0|1 }}
   */
  function createRewardStream(p, seed) {
    const rng = mulberry32(seed);
    return {
      next: function () {
        return rng() < p ? 1 : 0;
      },
    };
  }

  // ===== SECTION: Agents =============================================
  // A・Bは選択規則（epsilon-greedy）を共有し、更新則だけが異なる。
  //   A（対称）      : V[a] += α·(r − V[a])         … 当たりも外れも等しく学ぶ
  //   B（非対称/確証）: 当たりは α(1+β) で重く、外れは α(1−β) で軽く更新
  // β=0 のとき αp=αn=α なので B は A と完全に一致する。

  /**
   * createAgent: エージェントの状態を生成。
   * V は価値推定、counts/rewardCounts は含意テーブル・統計用の走行カウント。
   * @param {number} N 行動数
   * @param {number} V0 初期価値（全行動同一＝対称初期化）
   * @param {'A'|'B'} kind
   * @param {{alpha:number, epsilon:number, beta:number}} traits 実効特性
   */
  function createAgent(N, V0, kind, traits) {
    const V = new Float64Array(N);
    for (let i = 0; i < N; i++) V[i] = V0; // 全行動を同一値で初期化（えこひいきなし）
    return {
      kind: kind,
      traits: traits,
      V: V,
      counts: new Int32Array(N), // 各行動の選択回数
      rewardCounts: new Int32Array(N), // 各行動を選んだうち報酬が出た回数
    };
  }

  /**
   * argmaxWithRandomTieBreak: 最大値のインデックスを返す。同値が複数ある場合は
   * 与えられた rng で一様ランダムに選ぶ（reservoir sampling）。
   * ★公平性の要★ 素朴な indexOf(max) は t=0（全価値同一）で常に行動0を選ぶため
   * コード上の偏りになる。必ずこのランダム・タイブレークを使う。
   * @param {Float64Array} V
   * @param {() => number} rng
   * @returns {number}
   */
  function argmaxWithRandomTieBreak(V, rng) {
    let best = V[0];
    let idx = 0;
    let tieCount = 1;
    for (let i = 1; i < V.length; i++) {
      if (V[i] > best) {
        best = V[i];
        idx = i;
        tieCount = 1;
      } else if (V[i] === best) {
        tieCount++;
        if (rng() < 1 / tieCount) idx = i; // 同値群から一様抽出
      }
    }
    return idx;
  }

  /**
   * selectEpsilonGreedy: 確率 ε で一様ランダム探索、そうでなければ貪欲選択。
   * A・B共通（選択規則を統一し、A/Bの違いを更新則だけに限定する）。
   */
  function selectEpsilonGreedy(agent, rng, epsilon) {
    const N = agent.V.length;
    if (rng() < epsilon) {
      return Math.min(N - 1, (rng() * N) | 0); // 一様ランダム（末尾クランプ）
    }
    return argmaxWithRandomTieBreak(agent.V, rng);
  }

  /** A: 対称な価値更新（Rescorla-Wagner）。 */
  function updateSymmetric(agent, a, r, alpha) {
    agent.V[a] += alpha * (r - agent.V[a]);
  }

  /**
   * B: 非対称な価値更新（確証バイアス）。
   * 報酬あり（確証）は α(1+β) で重く、報酬なし（反証）は α(1−β) で軽く更新。
   * 安定性のため確証側の実効学習率を1でクランプ（α(1+β)≤1 を保証）。
   */
  function updateAsymmetric(agent, a, r, alpha, beta) {
    if (r === 1) {
      const ap = Math.min(alpha * (1 + beta), 1);
      agent.V[a] += ap * (1 - agent.V[a]);
    } else {
      const an = alpha * (1 - beta);
      agent.V[a] += an * (0 - agent.V[a]);
    }
  }

  /**
   * impliedContingency: 走行カウントから各行動の随伴性を推定（表示専用）。
   * P(r|a)=報酬率(行動a選択時), P(r|¬a)=報酬率(a以外選択時), ΔP=その差。
   * 報酬は行動と無関係なので実測 ΔP は0近傍になるはず。Bの信念Vがこれから
   * 乖離していること（＝迷信）を可視化するために用いる。更新則には非関与。
   * @param {object} agent
   * @param {number} totalSteps 全行動の選択回数合計（= t）
   * @param {number} totalRewards 全報酬回数合計
   */
  function impliedContingency(agent, totalSteps, totalRewards) {
    const N = agent.V.length;
    const eps = 0.5; // 擬似カウント（0除算回避・平滑化）
    const out = [];
    for (let a = 0; a < N; a++) {
      const n1 = agent.counts[a];
      const w1 = agent.rewardCounts[a];
      const n0 = totalSteps - n1;
      const w0 = totalRewards - w1;
      const pRA = (w1 + eps) / (n1 + 2 * eps);
      const pRnotA = (w0 + eps) / (n0 + 2 * eps);
      out.push({ action: a, n: n1, pRA: pRA, pRnotA: pRnotA, dP: pRA - pRnotA });
    }
    return out;
  }

  // ===== SECTION: Simulation engine =================================
  // stepSimulation は必ず「r を先に確定 → 行動 a を選ぶ → 更新」の順で実行する。
  // （構造監査の第二点：時間順序でも報酬は行動に先行する）

  /**
   * createSimulation: 1個体分のシミュレーション状態を構築。
   * シードキー方針（ペア比較）:
   *   ・報酬ストリームは personaIndex のみでキー → 同一ペルソナのA版とB版は
   *     同じ報酬列を見る（更新則だけの差を公平に比較できる）。
   *   ・行動ストリームは (personaIndex, kind) でキー → A/Bで別。
   * @param {object} config {seed,N,p,V0,alpha,epsilon,beta}
   * @param {'A'|'B'} kind
   * @param {number} personaIndex
   * @param {{alpha:number,epsilon:number,beta:number}} traits 実効特性
   */
  function createSimulation(config, kind, personaIndex, traits) {
    const rewardSeed = deriveSeed(config.seed, "reward", personaIndex);
    const actionSeed = deriveSeed(config.seed, "action:" + kind, personaIndex);
    return {
      kind: kind,
      personaIndex: personaIndex,
      p: config.p,
      alpha: traits.alpha,
      epsilon: traits.epsilon,
      beta: traits.beta,
      rewardStream: createRewardStream(config.p, rewardSeed),
      actionRng: mulberry32(actionSeed),
      agent: createAgent(config.N, config.V0, kind, traits),
      t: 0,
      cumReward: 0,
    };
  }

  /**
   * stepSimulation: 1ステップ進める。
   * ★構造監査の第二点★ 報酬 r を行動 a より先に確定する（下記の実行順序が保証）。
   */
  function stepSimulation(sim) {
    const r = sim.rewardStream.next(); // (1) 報酬を先に確定（この時点で a は未定義）
    const a = selectEpsilonGreedy(sim.agent, sim.actionRng, sim.epsilon); // (2) 行動選択
    if (sim.kind === "A") {
      updateSymmetric(sim.agent, a, r, sim.alpha); // (3) 更新
    } else {
      updateAsymmetric(sim.agent, a, r, sim.alpha, sim.beta);
    }
    sim.agent.counts[a]++;
    if (r === 1) sim.agent.rewardCounts[a]++;
    sim.cumReward += r;
    sim.t++;
    return { a: a, r: r };
  }

  /**
   * createPopulation: A・B 各 M 体の小集団を構築（PR②では均質＝全員同一特性）。
   * ペルソナ特性は PR⑥で導入する。
   */
  function createPopulation(config) {
    const M = config.M;
    const traits = {
      alpha: config.alpha,
      epsilon: config.epsilon,
      beta: config.beta,
    };
    const A = [];
    const B = [];
    for (let i = 0; i < M; i++) {
      A.push(createSimulation(config, "A", i, traits));
      B.push(createSimulation(config, "B", i, traits));
    }
    return { A: A, B: B, config: config, t: 0 };
  }

  /** stepPopulation: 集団全体を1ステップ進める。 */
  function stepPopulation(pop) {
    for (let i = 0; i < pop.A.length; i++) stepSimulation(pop.A[i]);
    for (let i = 0; i < pop.B.length; i++) stepSimulation(pop.B[i]);
    pop.t++;
  }

  // ===== SECTION: Statistics ========================================
  // 迷信の強さ＝「信念の集中度」（PR②）。数値解析基盤（不完全ガンマ・カイ二乗・
  // p値較正・一様性）はこのセクションに実装（PR③）。

  /**
   * beliefConcentrationHerfindahl: 正規化した価値ベクトルの集中度 [0,1]。
   * 0 = 一様（迷信なし）, 1 = 完全に1行動へ集中（強い迷信）。
   * 正規化 Herfindahl: (H − 1/N) / (1 − 1/N), H = Σ pᵢ².
   * @param {Float64Array|number[]} V 非負の価値ベクトル
   */
  function beliefConcentrationHerfindahl(V) {
    const N = V.length;
    if (N <= 1) return 0;
    let sum = 0;
    for (let i = 0; i < N; i++) sum += V[i] > 0 ? V[i] : 0;
    if (sum <= 0) return 0; // 全て0（初期状態など）→ 集中なし
    let H = 0;
    for (let i = 0; i < N; i++) {
      const pi = (V[i] > 0 ? V[i] : 0) / sum;
      H += pi * pi;
    }
    const minH = 1 / N;
    return (H - minH) / (1 - minH);
  }

  /**
   * shannonEntropy: 確率分布のシャノンエントロピー（nat）。
   * @param {number[]|Float64Array} probs 合計1を想定
   */
  function shannonEntropy(probs) {
    let h = 0;
    for (let i = 0; i < probs.length; i++) {
      const q = probs[i];
      if (q > 0) h -= q * Math.log(q);
    }
    return h;
  }

  /** meanBeliefConcentration: 集団（sim配列）の平均信念集中度。 */
  function meanBeliefConcentration(sims) {
    if (sims.length === 0) return 0;
    let s = 0;
    for (let i = 0; i < sims.length; i++) {
      s += beliefConcentrationHerfindahl(sims[i].agent.V);
    }
    return s / sims.length;
  }

  // --- 数値解析基盤（PR③）---

  /**
   * erf: 誤差関数。Abramowitz & Stegun 7.1.26 の多項式近似（最大誤差 ~1.5×10⁻⁷）。
   */
  function erf(x) {
    var sign = x >= 0 ? 1 : -1;
    x = Math.abs(x);
    var t = 1 / (1 + 0.3275911 * x);
    var poly = t * (0.254829592 + t * (-0.284496736 + t * (1.421413741 + t * (-1.453152027 + t * 1.061405429))));
    return sign * (1 - poly * Math.exp(-x * x));
  }

  /** stdNormalCDF: 標準正規分布の累積分布関数。 */
  function stdNormalCDF(x) {
    return 0.5 * (1 + erf(x / Math.SQRT2));
  }

  /**
   * logGamma: log(Γ(x)) の Lanczos 近似（g=7, n=9, IEEE 754 精度で ~15桁）。
   * x < 0.5 のとき反射公式 Γ(x)Γ(1-x) = π/sin(πx) を使う。
   */
  function logGamma(x) {
    if (x < 0.5) {
      return Math.log(Math.PI / Math.sin(Math.PI * x)) - logGamma(1 - x);
    }
    x -= 1;
    var c = [
      0.99999999999980993,
      676.5203681218851,
      -1259.1392167224028,
      771.32342877765313,
      -176.61502916214059,
      12.507343278686905,
      -0.13857109526572012,
      9.9843695780195716e-6,
      1.5056327351493116e-7,
    ];
    var a = c[0];
    var t = x + 7 + 0.5;
    for (var i = 1; i < c.length; i++) a += c[i] / (x + i);
    return 0.5 * Math.log(2 * Math.PI) + (x + 0.5) * Math.log(t) - t + Math.log(a);
  }

  /**
   * regularizedGammaP: 下側正則不完全ガンマ関数 P(s,x) = γ(s,x)/Γ(s)。
   * x < s+1 の領域で収束が速い級数展開を使う。x ≥ s+1 では Q 側に委譲。
   */
  function regularizedGammaP(s, x) {
    if (x < 0) return 0;
    if (x === 0) return 0;
    if (x >= s + 1) return 1 - regularizedGammaQ(s, x);
    var term = 1 / s;
    var sum = term;
    for (var k = 1; k <= 300; k++) {
      term *= x / (s + k);
      sum += term;
      if (Math.abs(term) < 1e-14 * Math.abs(sum)) break;
    }
    return Math.exp(-x + s * Math.log(x) - logGamma(s)) * sum;
  }

  /**
   * regularizedGammaQ: 上側正則不完全ガンマ関数 Q(s,x) = Γ(s,x)/Γ(s) = 1 - P(s,x)。
   * x ≥ s+1 の領域で収束が速い Lentz 連分数を使う。x < s+1 では P 側に委譲。
   */
  function regularizedGammaQ(s, x) {
    if (x < 0) return 1;
    if (x < s + 1) return 1 - regularizedGammaP(s, x);
    var TINY = 1e-300;
    var b = x + 1 - s;
    var c = 1 / TINY;
    var d = Math.abs(b) < TINY ? 1 / TINY : 1 / b;
    var f = d;
    for (var i = 1; i <= 300; i++) {
      var an = -i * (i - s);
      b += 2;
      d = an * d + b;
      if (Math.abs(d) < TINY) d = TINY;
      c = b + an / c;
      if (Math.abs(c) < TINY) c = TINY;
      d = 1 / d;
      var del = d * c;
      f *= del;
      if (Math.abs(del - 1) < 1e-13) break;
    }
    return Math.exp(-x + s * Math.log(x) - logGamma(s)) * f;
  }

  /**
   * chiSquareSurvivalP: カイ二乗分布の生存関数（右裾確率、いわゆる p 値）。
   * = Q(df/2, chi2/2) = regularizedGammaQ(df/2, chi2/2)。
   * df < 1（全固着で活動行動が1つ等）は意味をなさないので NaN を返す。
   */
  function chiSquareSurvivalP(chi2, df) {
    if (df < 1) return NaN;
    if (chi2 <= 0) return 1;
    return regularizedGammaQ(df / 2, chi2 / 2);
  }

  /**
   * chiSquareIndependenceTest: 行動×報酬の分割表から独立性検定を行う。
   * @param {Array<[number,number]>} O 観測数行列。各行 [報酬なし, 報酬あり]（活動行動のみ）。
   * @returns {{ chi2: number, df: number, p: number }}
   *
   * ★注意★ 報酬は構造上行動と無関係なので、この検定は構造的に棄却されない。
   * 多シードでの p 値較正（Uniform[0,1]を確認）が第二の担保であり、
   * 単一の「非有意」を「独立の証明」と呼んではならない。
   */
  function chiSquareIndependenceTest(O) {
    var rows = O.filter(function (row) { return row[0] + row[1] > 0; });
    var R = rows.length;
    if (R < 2) return { chi2: 0, df: 0, p: NaN };
    var total = rows.reduce(function (s, row) { return s + row[0] + row[1]; }, 0);
    if (total === 0) return { chi2: 0, df: R - 1, p: 1 };
    var rowTotals = rows.map(function (row) { return row[0] + row[1]; });
    var colTotals = [
      rows.reduce(function (s, row) { return s + row[0]; }, 0),
      rows.reduce(function (s, row) { return s + row[1]; }, 0),
    ];
    var chi2 = 0;
    for (var r = 0; r < R; r++) {
      for (var c = 0; c < 2; c++) {
        var E = rowTotals[r] * colTotals[c] / total;
        if (E > 0) chi2 += (rows[r][c] - E) * (rows[r][c] - E) / E;
      }
    }
    var df = R - 1; // (R-1)*(2-1)
    if (df < 1) return { chi2: chi2, df: df, p: NaN };
    return { chi2: chi2, df: df, p: chiSquareSurvivalP(chi2, df) };
  }

  /**
   * buildContingencyTable: エージェントの走行カウントから独立性検定用の
   * 2列テーブル（[報酬なし, 報酬あり] 行 × 活動行動数）を構築する。
   */
  function buildContingencyTable(agent) {
    var N = agent.V.length;
    var table = [];
    for (var a = 0; a < N; a++) {
      if (agent.counts[a] > 0) {
        table.push([agent.counts[a] - agent.rewardCounts[a], agent.rewardCounts[a]]);
      }
    }
    return table;
  }

  /**
   * chiSquareGoodnessOfFitUniform: 優勢行動ヒストグラムが一様分布に従うか検定。
   * counts[i] = i番目の行動が K 回試行で優勢だった回数。
   * @param {number[]} counts 長さ N（行動数）の整数配列
   * @returns {{ chi2: number, df: number, p: number }}
   */
  function chiSquareGoodnessOfFitUniform(counts) {
    var N = counts.length;
    if (N < 2) return { chi2: 0, df: 0, p: NaN };
    var total = counts.reduce(function (a, b) { return a + b; }, 0);
    if (total === 0) return { chi2: 0, df: N - 1, p: 1 };
    var expected = total / N;
    var chi2 = 0;
    for (var i = 0; i < N; i++) {
      chi2 += (counts[i] - expected) * (counts[i] - expected) / expected;
    }
    var df = N - 1;
    if (df < 1) return { chi2: chi2, df: df, p: NaN };
    return { chi2: chi2, df: df, p: chiSquareSurvivalP(chi2, df) };
  }

  /**
   * pValueHistogram: 多シードで独立性検定を走らせ p 値の配列を返す（較正確認用）。
   * p 値が Uniform[0,1] に従えば検定は正しく較正されている（偽陽性率≈5%）。
   * @param {number[]} seeds 試行ごとの乱数シード配列
   * @param {object} config {N,p,alpha,epsilon,V0,T} — M は不要（1体ずつ走らせる）
   * @returns {number[]} 有効な p 値の配列
   */
  function pValueHistogram(seeds, config) {
    var pValues = [];
    for (var i = 0; i < seeds.length; i++) {
      var cfg = {
        seed: seeds[i], N: config.N, p: config.p, V0: config.V0 !== undefined ? config.V0 : 0,
      };
      var traits = { alpha: config.alpha, epsilon: config.epsilon, beta: 0 };
      var sim = createSimulation(cfg, "A", 0, traits);
      for (var t = 0; t < config.T; t++) stepSimulation(sim);
      var table = buildContingencyTable(sim.agent);
      var result = chiSquareIndependenceTest(table);
      if (typeof result.p === "number" && !isNaN(result.p)) pValues.push(result.p);
    }
    return pValues;
  }

  // ===== SECTION: Rendering（PR④で実装） ============================
  // Canvas 自作チャート（母集団パネル・平均±帯・ヒストグラム）…

  // ===== SECTION: Personas（PR⑥で実装） =============================

  // ===== SECTION: UI wiring / bootstrap =============================

  /**
   * スモークテスト（コンソール出力）: PR②までの土台とエンジンを検証する。
   *   (1) 報酬率が p に収束する
   *   (2) deriveSeed が異なるキーで異なるシードを返す
   *   (3) 集団を走らせ、B（確証バイアス）の平均信念集中度が A を上回る
   *       （＝「確証バイアスが迷信を強める」中心仮説の一次確認）
   *   (4) β=0 のとき A と B の価値が完全一致する（B≡A）
   * ※ 正式な検証は実行フェーズ／PR⑧で行う。
   */
  function smokeTest() {
    // (1) 報酬率
    const p = 0.3;
    const stream = createRewardStream(p, deriveSeed(12345, "reward", 0));
    let sum = 0;
    const n = 100000;
    for (let i = 0; i < n; i++) sum += stream.next();
    console.log("[smoke] 報酬率 実測=%s / 目標=%s (n=%d)", (sum / n).toFixed(4), p, n);

    // (2) シード独立性
    console.log(
      "[smoke] deriveSeed 独立性: reward=%d action:A=%d action:B=%d (相異なるべき)",
      deriveSeed(12345, "reward", 0),
      deriveSeed(12345, "action:A", 0),
      deriveSeed(12345, "action:B", 0)
    );

    // (3) 集団を走らせ A/B の平均信念集中度を比較
    const config = {
      N: 5, p: 0.3, alpha: 0.1, V0: 0.0, epsilon: 0.1, beta: 0.5,
      seed: 12345, M: 10,
    };
    const pop = createPopulation(config);
    const T = 3000;
    for (let t = 0; t < T; t++) stepPopulation(pop);
    const concA = meanBeliefConcentration(pop.A);
    const concB = meanBeliefConcentration(pop.B);
    console.log(
      "[smoke] T=%d 平均信念集中度: A=%s B=%s (β=%s → B>A を期待)",
      T, concA.toFixed(3), concB.toFixed(3), config.beta
    );

    // (4) β=0 で B≡A（同一ペルソナ・同一報酬列で価値が完全一致）
    const cfg0 = Object.assign({}, config, { beta: 0.0 });
    const simA = createSimulation(cfg0, "A", 0, { alpha: 0.1, epsilon: 0.1, beta: 0.0 });
    const simB = createSimulation(cfg0, "B", 0, { alpha: 0.1, epsilon: 0.1, beta: 0.0 });
    // 選択の乱数列は kind でキーが違うため、価値一致の検証は「同じ行動・同じ報酬」
    // を与えて更新則の一致を見る（更新則がβ=0で一致することの確認）。
    let identical = true;
    const rngR = mulberry32(deriveSeed(999, "r", 0));
    for (let i = 0; i < 500; i++) {
      const a = i % cfg0.N;
      const r = rngR() < cfg0.p ? 1 : 0;
      updateSymmetric(simA.agent, a, r, 0.1);
      updateAsymmetric(simB.agent, a, r, 0.1, 0.0);
    }
    for (let a = 0; a < cfg0.N; a++) {
      if (Math.abs(simA.agent.V[a] - simB.agent.V[a]) > 1e-12) identical = false;
    }
    console.log("[smoke] β=0 で更新則 B≡A: %s", identical ? "OK（一致）" : "NG（不一致）");

    // --- PR③ 統計エンジン ---
    // (5) logGamma の既知値: logGamma(1)=0, logGamma(0.5)=0.5*log(π)
    const lgam1 = logGamma(1);
    const lgamHalf = logGamma(0.5);
    const lgamHalfExpected = 0.5 * Math.log(Math.PI);
    console.log(
      "[smoke] logGamma(1)=%s (期待:0.0000000000)",
      lgam1.toFixed(10)
    );
    console.log(
      "[smoke] logGamma(0.5)=%s (期待:%s)",
      lgamHalf.toFixed(10), lgamHalfExpected.toFixed(10)
    );

    // (6) chiSquareSurvivalP の既知値: χ²(1)=3.841 → p≈0.05
    const pChi = chiSquareSurvivalP(3.841, 1);
    const pZero = chiSquareSurvivalP(0, 1);
    console.log(
      "[smoke] chiSquareSurvivalP(3.841,1)=%s (期待:~0.0500)",
      pChi.toFixed(4)
    );
    console.log(
      "[smoke] chiSquareSurvivalP(0,1)=%s (期待:1.0000)",
      pZero.toFixed(4)
    );

    // (7) 独立性検定: T=1000 後のエージェントで p 値が有効値 ∈ [0,1]
    const simForTest = createSimulation(
      { seed: 99, N: 5, p: 0.3, V0: 0.0 },
      "A", 0, { alpha: 0.1, epsilon: 0.1, beta: 0 }
    );
    for (let tt = 0; tt < 1000; tt++) stepSimulation(simForTest);
    const tbl = buildContingencyTable(simForTest.agent);
    const tRes = chiSquareIndependenceTest(tbl);
    console.log(
      "[smoke] 独立性検定 (T=1000): chi2=%s df=%d p=%s (p∈[0,1]を期待)",
      tRes.chi2.toFixed(3), tRes.df,
      (typeof tRes.p === "number" && !isNaN(tRes.p)) ? tRes.p.toFixed(4) : "NaN"
    );

    // (8) p 値ヒストグラム(20シード): 有効な p 値が得られる
    //     報酬は構造上独立なので、多くは非有意（p≥0.05）になる
    const testSeeds = [];
    for (let si = 0; si < 20; si++) testSeeds.push((si + 1) * 137);
    const pVals = pValueHistogram(
      testSeeds,
      { N: 5, p: 0.3, alpha: 0.1, epsilon: 0.1, V0: 0.0, T: 500 }
    );
    const belowFive = pVals.filter(function (v) { return v < 0.05; }).length;
    console.log(
      "[smoke] p値ヒストグラム(20シード): 有効=%d/20, <0.05の個数=%d (Uniform[0,1]由来なら期待値≈1)",
      pVals.length, belowFive
    );
  }

  function init() {
    smokeTest();
  }

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", init);
  } else {
    init();
  }

  // テスト・後続PRからの参照用に最小限を公開（本番UIには不要）。
  window.__superstitionSim = {
    // PRNG / 環境
    mulberry32: mulberry32,
    xmur3: xmur3,
    deriveSeed: deriveSeed,
    createRewardStream: createRewardStream,
    // エージェント
    createAgent: createAgent,
    argmaxWithRandomTieBreak: argmaxWithRandomTieBreak,
    selectEpsilonGreedy: selectEpsilonGreedy,
    updateSymmetric: updateSymmetric,
    updateAsymmetric: updateAsymmetric,
    impliedContingency: impliedContingency,
    // エンジン
    createSimulation: createSimulation,
    stepSimulation: stepSimulation,
    createPopulation: createPopulation,
    stepPopulation: stepPopulation,
    // 統計（PR②）
    beliefConcentrationHerfindahl: beliefConcentrationHerfindahl,
    shannonEntropy: shannonEntropy,
    meanBeliefConcentration: meanBeliefConcentration,
    // 統計エンジン（PR③）
    erf: erf,
    stdNormalCDF: stdNormalCDF,
    logGamma: logGamma,
    regularizedGammaP: regularizedGammaP,
    regularizedGammaQ: regularizedGammaQ,
    chiSquareSurvivalP: chiSquareSurvivalP,
    chiSquareIndependenceTest: chiSquareIndependenceTest,
    buildContingencyTable: buildContingencyTable,
    chiSquareGoodnessOfFitUniform: chiSquareGoodnessOfFitUniform,
    pValueHistogram: pValueHistogram,
  };
})();
</script>
